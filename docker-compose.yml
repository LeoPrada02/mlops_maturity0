services:
  mlflow:
    image: python:3.11-slim
    container_name: mlops_mlflow
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir mlflow &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /app/mlartifacts"
    volumes:
      - ./:/app
    ports:
      - "5000:5000"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mlops_api
    working_dir: /app
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  prometheus:
    image: prom/prometheus:latest
    container_name: mlops_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: mlops_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

